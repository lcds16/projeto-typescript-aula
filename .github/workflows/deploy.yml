name: CI/CD - Pipeline - INDT

on: 
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
  
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # - name: restart docker
      #   run: |
      #     sudo /usr/local/bin/docker-restart.sh
      #     sleep 10

      - name: Login no Github Container Registry
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Remove Container antigo
        run: |
          docker compose down || true

      - name: Build da imagem Docker
        run: |
          docker build -t ghcr.io/lcds16/imagem-da-lorena:latest .

      - name: Push da imagem para o Github Container Registry
        run: |
          docker push ghcr.io/lcds16/imagem-da-lorena:latest

      - name: Cria o .env na VM
        run: |
          cat > .env << EOF
          DB_HOST=postgres
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          NODE_ENV=production
          PORT=6060
          JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          EOF

      - name: Subir Docker
        run: |
          docker compose up -d --build
        
      - name: Verificar se o container está rodando
        run: |
          docker compose ps